server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Public landing — static, SEO-indexable
    location = / {
        try_files /landing.html =404;
        add_header Cache-Control "public, max-age=300";
    }

    # SEO files
    location = /robots.txt { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }

    # SPA route — OAuth callback must be handled by React, not proxied
    location = /auth/callback {
        try_files $uri /index.html;
    }

    # Proxy API calls to the gateway
    location ~ ^/(auth|graph|ai|material|check)/ {
        proxy_pass         http://gateway:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache hashed static assets aggressively
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
